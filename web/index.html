<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tool_bocs">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tool_bocs</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDcGPon7dpfONgGUw8lBMOXveihNhaepVo"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
    }
    #splash-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      background-color: #000000;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .splash-logo {
      width: 250px; /* Adjust size based on the logo */
      height: auto;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    .tagline {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="splash-container">
    <img src="splash_logo.png" class="splash-logo" alt="Toolucs Logo">
    <div class="tagline">Buy &bull; Sell &bull; Exchange &bull; Lend</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Remove the splash screen when Flutter renders the first frame
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash-container');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function() {
          splash.remove();
        }, 500); // Wait for the transition to finish before removing from DOM
      }
    });
  </script>
</body>
</html>
