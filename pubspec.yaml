name: tool_bocs
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  provider: ^6.1.5+1
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  rename_app: ^1.6.5
  shimmer: ^3.0.0
  dio: ^5.4.0
  logger: ^2.0.2
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.0.1
  google_maps_flutter: ^2.10.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.6
  flutter_local_notifications: ^20.1.0
  google_fonts: ^8.0.1
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.3
  rxdart: ^0.28.0
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/playstore_icon.png"
  image_path: "assets/playstore_icon.png"

flutter:
  uses-material-design: true

 
  assets:
    - assets/
    - assets/icons/chat.svg
    - assets/icons/give.svg
    - assets/icons/take.svg
    - assets/icons/logout.svg
    - assets/icons/logout1.svg
  
